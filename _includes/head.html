<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ site.description }}" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
<style>
  :root {
    --bg:        #0a0c10;
    --bg2:       #0f1117;
    --bg3:       #141820;
    --border:    #1e2535;
    --accent:    #00e5ff;
    --accent2:   #7c3aed;
    --accent3:   #10b981;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --glow:      0 0 20px rgba(0,229,255,0.15);
    --font-mono: 'Courier New', 'Consolas', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    line-height: 1.7; overflow-x: hidden;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 3px; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 999;
    background: rgba(10,12,16,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem; display: flex; align-items: center; justify-content: space-between;
    height: 60px;
  }
  .nav-brand {
    font-family: var(--font-mono); font-size: 1rem;
    color: var(--accent); letter-spacing: 0.1em; text-decoration: none;
  }
  .nav-brand span { color: var(--muted); }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a {
    color: var(--muted); text-decoration: none; font-size: 0.85rem;
    letter-spacing: 0.05em; text-transform: uppercase; transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--accent); }

  /* SECTIONS */
  section { padding: 100px 0 80px; }
  .container { max-width: 1000px; margin: 0 auto; padding: 0 2rem; }

  /* HERO */
  #home {
    min-height: 100vh; display: flex; align-items: center;
    position: relative; overflow: hidden; padding-top: 60px;
  }
  .hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
  .terminal-line {
    font-family: var(--font-mono); font-size: 0.8rem; color: var(--accent3); margin-bottom: 1.5rem; opacity: 0.8;
  }
  .terminal-line::before { content: '> '; color: var(--accent); }
  .hero-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
  .tag {
    font-family: var(--font-mono); font-size: 0.72rem; color: var(--accent);
    background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.25);
    padding: 0.25rem 0.7rem; border-radius: 3px; letter-spacing: 0.05em;
  }
  .tag.purple { color: #a78bfa; background: rgba(124,58,237,0.1); border-color: rgba(124,58,237,0.3); }
  .tag.green  { color: var(--accent3); background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.3); }
  h1.hero-name { font-size: clamp(2.2rem, 4vw, 3.2rem); font-weight: 700; line-height: 1.2; margin-bottom: 0.5rem; }
  h1.hero-name .en { color: var(--accent); }
  .hero-motto {
    font-size: 1rem; color: var(--muted); border-left: 3px solid var(--accent2);
    padding-left: 1rem; margin: 1.5rem 0; line-height: 1.8; font-style: italic;
  }
  .hero-btns { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 2rem; }
  .btn {
    padding: 0.65rem 1.5rem; border-radius: 4px; font-size: 0.85rem;
    font-weight: 600; text-decoration: none; letter-spacing: 0.04em;
    transition: all 0.2s; cursor: pointer; display: inline-flex; align-items: center; gap: 0.4rem;
  }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-primary:hover { background: #33eeff; box-shadow: var(--glow); }
  .btn-outline { border: 1px solid var(--accent2); color: #a78bfa; background: transparent; }
  .btn-outline:hover { background: rgba(124,58,237,0.1); box-shadow: 0 0 20px rgba(124,58,237,0.2); }
  .btn-ghost { border: 1px solid var(--border); color: var(--muted); background: transparent; }
  .btn-ghost:hover { border-color: var(--muted); color: var(--text); }
  .hero-stats { display: flex; gap: 2rem; margin-top: 2.5rem; padding-top: 2rem; border-top: 1px solid var(--border); }
  .stat-item { text-align: center; }
  .stat-num { font-family: var(--font-mono); font-size: 1.4rem; color: var(--accent); font-weight: 700; display: block; }
  .stat-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .hero-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 2rem; box-shadow: var(--glow); position: relative; overflow: hidden;
  }
  .hero-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
  }
  .avatar-circle {
    width: 90px; height: 90px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; font-weight: 700; color: white;
    margin: 0 auto 1.5rem; box-shadow: 0 0 30px rgba(0,229,255,0.3);
  }
  .card-info-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.7rem 0; border-bottom: 1px solid var(--border); font-size: 0.85rem;
  }
  .card-info-row:last-child { border-bottom: none; }
  .card-key { color: var(--muted); font-family: var(--font-mono); font-size: 0.75rem; }
  .card-val { color: var(--text); }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--accent3); box-shadow: 0 0 6px var(--accent3); margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .mesh-bg {
    position: absolute; inset: 0; z-index: -1;
    background: radial-gradient(ellipse 60% 50% at 20% 40%, rgba(0,229,255,0.05) 0%, transparent 70%),
                radial-gradient(ellipse 40% 60% at 80% 60%, rgba(124,58,237,0.06) 0%, transparent 70%);
  }

  /* SECTION HEADERS */
  .section-header { margin-bottom: 3rem; }
  .section-label {
    font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent);
    letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.5rem; opacity: 0.8;
  }
  .section-label::before { content: '// '; }
  h2.section-title { font-size: clamp(1.6rem, 3vw, 2.2rem); font-weight: 700; margin-bottom: 0.75rem; }
  .section-subtitle { color: var(--muted); font-size: 0.95rem; }
  .line-deco { width: 60px; height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; margin-top: 1rem; }

  /* ABOUT */
  #about { background: var(--bg2); }
  .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start; }
  .about-bio { font-size: 0.95rem; color: var(--muted); line-height: 1.9; }
  .about-bio p { margin-bottom: 1rem; }
  .about-bio strong { color: var(--text); }
  .about-meta { margin-top: 1.5rem; }
  .meta-item { display: flex; gap: 1rem; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
  .meta-item:last-child { border-bottom: none; }
  .meta-icon { font-size: 1rem; flex-shrink: 0; }
  .meta-key { color: var(--muted); min-width: 80px; font-size: 0.8rem; }
  .meta-val { color: var(--text); }
  .research-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .research-card {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
    padding: 1.2rem; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .research-card:hover { border-color: var(--accent); box-shadow: var(--glow); }
  .rc-icon { font-size: 1.4rem; margin-bottom: 0.5rem; }
  .rc-title { font-size: 0.85rem; font-weight: 600; color: var(--text); margin-bottom: 0.3rem; }
  .rc-desc { font-size: 0.78rem; color: var(--muted); }

  /* SKILLS */
  .skills-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
  .skill-group {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: 1.5rem; transition: border-color 0.2s;
  }
  .skill-group:hover { border-color: var(--accent2); }
  .sg-label {
    font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent);
    letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 1.2rem;
    padding-bottom: 0.7rem; border-bottom: 1px solid var(--border);
  }
  .skill-pills { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .pill {
    font-size: 0.8rem; padding: 0.3rem 0.8rem; border-radius: 20px;
    border: 1px solid var(--border); color: var(--muted); background: var(--bg3);
    transition: all 0.2s;
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,0.05); }

  /* PROJECTS */
  #projects { background: var(--bg2); }
  .project-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
  .project-card {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
    padding: 0; overflow: hidden; transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    display: flex; flex-direction: column;
  }
  .project-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,229,255,0.1); }
  .pc-top { height: 4px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .pc-body { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; }
  .pc-icon { font-size: 2rem; margin-bottom: 0.8rem; }
  .pc-title { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
  .pc-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.6; flex: 1; margin-bottom: 1rem; }
  .pc-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.2rem; }
  .pc-tag { font-size: 0.68rem; padding: 0.2rem 0.6rem; border-radius: 12px; border: 1px solid var(--border); color: var(--muted); font-family: var(--font-mono); background: var(--bg); }
  .pc-link { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.8rem; color: var(--accent); text-decoration: none; font-weight: 600; transition: color 0.2s; }
  .pc-link:hover { color: #33eeff; }
  .pc-link::after { content: ' →'; transition: transform 0.2s; }
  .pc-link:hover::after { transform: translateX(2px); }

  /* BLOG */
  #blog { background: var(--bg); }
  .blog-posts { display: grid; gap: 1rem; }
  .blog-post {
    display: flex; align-items: center; gap: 1.5rem;
    background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
    padding: 1.2rem 1.5rem; transition: border-color 0.2s; text-decoration: none;
  }
  .blog-post:hover { border-color: var(--accent); }
  .bp-date {
    font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent3);
    min-width: 100px; flex-shrink: 0;
  }
  .bp-title { font-size: 0.95rem; font-weight: 600; color: var(--text); }
  .bp-excerpt { font-size: 0.8rem; color: var(--muted); margin-top: 0.25rem; }

  /* BLOG POST PAGE */
  .post-header { padding: 100px 0 40px; }
  .post-date { font-family: var(--font-mono); font-size: 0.8rem; color: var(--accent3); margin-bottom: 0.5rem; }
  .post-body { font-size: 0.95rem; color: var(--muted); line-height: 2; }
  .post-body h2 { color: var(--accent); font-size: 1.3rem; margin: 2rem 0 1rem; font-family: var(--font-mono); }
  .post-body h2::before { content: '// '; color: var(--muted); font-size: 0.7rem; }
  .post-body p { margin-bottom: 1.2rem; }
  .post-body strong { color: var(--text); }
  .post-body ul, .post-body ol { padding-left: 1.5rem; margin-bottom: 1.5rem; }
  .post-body li { margin-bottom: 0.5rem; }
  .post-body pre {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    padding: 1rem; overflow-x: auto; font-family: var(--font-mono); font-size: 0.8rem;
    color: var(--accent3); margin: 1rem 0;
  }
  .post-body code {
    font-family: var(--font-mono); font-size: 0.85em;
    color: var(--accent); background: var(--bg3); padding: 0.1em 0.3em; border-radius: 3px;
  }

  /* CONTACT */
  .contact-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start; }
  .contact-info h3 { font-size: 1.2rem; margin-bottom: 1rem; }
  .contact-info p { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; line-height: 1.8; }
  .contact-links { display: flex; flex-direction: column; gap: 1rem; }
  .contact-link {
    display: flex; align-items: center; gap: 1rem; padding: 1rem 1.2rem;
    background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
    text-decoration: none; color: var(--text); transition: all 0.2s;
  }
  .contact-link:hover { border-color: var(--accent); background: rgba(0,229,255,0.04); }
  .cl-icon { font-size: 1.3rem; }
  .cl-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .cl-value { font-size: 0.9rem; color: var(--accent); font-family: var(--font-mono); }
  .contact-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: 2rem; text-align: center;
  }
  .contact-card-avatar {
    width: 70px; height: 70px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; font-weight: 700; color: white; margin: 0 auto 1rem;
  }
  .contact-card h4 { font-size: 1.1rem; margin-bottom: 0.25rem; }
  .contact-card p { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem; }
  .status-badge {
    display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.78rem;
    color: var(--accent3); background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.3); padding: 0.3rem 0.8rem; border-radius: 20px;
  }

  /* FOOTER */
  footer {
    background: var(--bg); border-top: 1px solid var(--border); padding: 2rem;
    text-align: center; font-size: 0.8rem; color: var(--muted); font-family: var(--font-mono);
  }
  footer span { color: var(--accent); }
  footer a { color: var(--muted); text-decoration: none; }
  footer a:hover { color: var(--accent); }

  .cursor-blink {
    display: inline-block; width: 2px; height: 1em; background: var(--accent);
    animation: blink 1s step-end infinite; vertical-align: text-bottom; margin-left: 2px;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  .fade-in { opacity: 0; transform: translateY(24px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .fade-in.visible { opacity: 1; transform: translateY(0); }

  .blog-nav { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
  .blog-nav a { color: var(--accent); text-decoration: none; font-family: var(--font-mono); }

  @media (max-width: 768px) {
    .hero-grid, .about-grid, .contact-wrapper { grid-template-columns: 1fr; }
    .skills-grid { grid-template-columns: 1fr; }
    .research-cards { grid-template-columns: 1fr; }
    .project-cards { grid-template-columns: 1fr; }
    .hero-card { display: none; }
    .nav-links { display: none; }
  }
</style>
